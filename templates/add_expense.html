{% extends "base.html" %}

{% block title %}Add Expense — Spendly{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Add Expense</h1>
            <p class="auth-subtitle">Record a new transaction</p>
        </div>

        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('add_expense') }}">

                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input
                        type="number"
                        id="amount"
                        name="amount"
                        class="form-input"
                        step="0.01"
                        min="0.01"
                        required
                        value="{{ form.amount if form else '' }}"
                    >
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input">
                        {% for cat in categories %}
                        <option value="{{ cat }}"
                            {% if form and form.category == cat %}selected{% endif %}>
                            {{ cat }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input
                        type="date"
                        id="date"
                        name="date"
                        class="form-input"
                        value="{{ form.date if form else today }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="description">Description <span class="label-hint">(optional)</span></label>
                    <input
                        type="text"
                        id="description"
                        name="description"
                        class="form-input"
                        maxlength="200"
                        value="{{ form.description if form else '' }}"
                    >
                </div>

                <button type="submit" class="btn-submit">Save Expense</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('profile') }}">Cancel — back to profile</a>
        </p>

    </div>
</section>
{% endblock %}
